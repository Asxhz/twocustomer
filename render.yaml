# Always-on agent on Render. Connect this repo in the Render dashboard, then set
# the env vars (sync:false ones) under the service's Environment tab.
#
# After deploy, point the web app at it:
#   web Vercel env  AGENT_BASE_URL = https://<service>.onrender.com
services:
  - type: web
    name: twocustomer-agent
    runtime: docker
    dockerfilePath: ./agent/Dockerfile
    dockerContext: ./agent
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: AGENT_SHARED_TOKEN
        sync: false
      - key: CONVEX_URL
        sync: false
      - key: BROWSERBASE_API_KEY
        sync: false
      - key: BROWSERBASE_PROJECT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DAILY_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_PUBLIC_KEY
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: VERCEL_TOKEN
        sync: false
      - key: VERCEL_SCOPE
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
